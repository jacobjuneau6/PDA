; PlatformIO Project Configuration for ESP32-S3 PDA
; Board: Custom ESP32-S3 with ST7789 240×320 TFT + MAX17048 + WS2812

[env:esp32-s3-dev]
platform     = espressif32
board        = esp32-s3-devkitc-1
framework    = arduino

monitor_speed = 115200

; --------------------------------------------------
; Libraries (fetched automatically by PlatformIO)
; --------------------------------------------------
lib_deps =
    adafruit/Adafruit GFX Library          @ ^1.11
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10
    adafruit/Adafruit MAX1704X             @ ^1.0
    fastled/FastLED                         @ ^3.7

; --------------------------------------------------
; Build flags
; --------------------------------------------------
build_flags =
    -D CORE_DEBUG_LEVEL=0
